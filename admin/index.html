<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 | Le Bouton Hair</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+KR:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f3efe8;
            --bg-card: #ffffff;
            --accent: #8c7355;
            --accent-light: #a68e6f;
            --accent-hover: #7a6349;
            --accent-soft: rgba(140, 115, 85, 0.08);
            --text-primary: #1c1916;
            --text-secondary: #6b6560;
            --text-muted: #a09890;
            --border: #e5dfd6;
            --border-light: #ede8e0;
            --danger: #c0392b;
            --danger-light: #e74c3c;
            --success: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-weight: 300;
            line-height: 1.8;
            letter-spacing: 0.02em;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden { display: none; }

        .login-box {
            text-align: center;
            padding: 60px 48px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            max-width: 400px;
            width: 90%;
        }

        .login-box h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.12em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .login-box h1 span { color: var(--accent); }

        .login-box p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        .login-box input:focus { border-color: var(--accent); }

        .login-error {
            color: var(--danger);
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }

        /* Header */
        .admin-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: rgba(250, 248, 245, 0.97);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }

        .admin-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
        }

        .admin-logo span { color: var(--accent); }

        .admin-badge {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-transform: uppercase;
            margin-left: 12px;
            padding: 3px 10px;
            border: 1px solid var(--accent);
        }

        .admin-header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Tabs */
        .admin-tabs {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            padding: 0 32px;
            z-index: 99;
        }

        .tab-btn {
            padding: 16px 24px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 500;
        }

        /* Main content */
        .admin-content {
            margin-top: 116px;
            padding: 40px 32px 80px;
            max-width: 960px;
            margin-left: auto;
            margin-right: auto;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .panel-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Cards */
        .edit-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .edit-card:hover {
            border-color: var(--border);
        }

        .edit-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .edit-card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.25em;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.8;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        /* Price row */
        .price-item {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .price-item:last-child { border-bottom: none; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.08em;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px 16px;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 11px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }

        .btn-icon:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-icon.btn-add:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .add-row-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            width: 100%;
            background: var(--accent-soft);
            border: 1px dashed var(--border);
            color: var(--accent);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            justify-content: center;
            margin-top: 12px;
        }

        .add-row-btn:hover {
            border-color: var(--accent);
            background: rgba(140, 115, 85, 0.12);
        }

        /* Designer card in admin */
        .designer-edit-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 32px;
            margin-bottom: 20px;
            position: relative;
        }

        .designer-edit-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .designer-edit-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--bg-secondary);
            overflow: hidden;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .designer-edit-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .photo-upload-area {
            position: relative;
            cursor: pointer;
        }

        .photo-upload-area input[type="file"] {
            display: none;
        }

        .photo-upload-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            color: #fff;
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        .photo-upload-area:hover .photo-upload-overlay {
            opacity: 1;
        }

        .photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 24px;
        }

        .designer-edit-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .designer-edit-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .designer-remove-btn {
            position: absolute;
            top: 16px;
            right: 16px;
        }

        /* Service card in admin */
        .service-edit-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 32px;
            margin-bottom: 20px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 16px 28px;
            background: var(--text-primary);
            color: #fff;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating save bar */
        .save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 16px 32px;
            background: rgba(250, 248, 245, 0.97);
            backdrop-filter: blur(24px);
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        .save-bar .status {
            font-size: 12px;
            color: var(--text-muted);
            margin-right: auto;
        }

        /* Preview modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-card);
            max-width: 600px;
            width: 90%;
            padding: 40px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 16px;
        }

        .modal p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.9;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header { padding: 0 16px; }
            .admin-tabs { padding: 0 16px; overflow-x: auto; }
            .tab-btn { padding: 14px 16px; white-space: nowrap; font-size: 12px; }
            .admin-content { padding: 24px 16px 80px; }
            .form-row { grid-template-columns: 1fr; }
            .price-item { grid-template-columns: 1fr; gap: 8px; }
            .edit-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Le <span>Bouton</span></h1>
            <p>Admin Panel</p>
            <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')login()">
            <p class="login-error" id="loginError">비밀번호가 올바르지 않습니다</p>
            <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="login()">로그인</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="admin-header">
        <div style="display:flex;align-items:center;">
            <a href="/" class="admin-logo">Le <span>Bouton</span></a>
            <span class="admin-badge">Admin</span>
        </div>
        <div class="admin-header-actions">
            <a href="/" class="btn btn-outline btn-sm" target="_blank">사이트 보기</a>
            <button class="btn btn-sm" style="color:var(--text-muted);" onclick="logout()">로그아웃</button>
        </div>
    </header>

    <!-- TABS -->
    <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('price')">가격 관리</button>
        <button class="tab-btn" onclick="switchTab('services')">메뉴 관리</button>
        <button class="tab-btn" onclick="switchTab('designers')">디자이너 관리</button>
    </div>

    <!-- CONTENT -->
    <div class="admin-content">

        <!-- PRICE TAB -->
        <div class="tab-panel active" id="tab-price">
            <h2 class="panel-title">가격 관리</h2>
            <p class="panel-desc">시술 카테고리별 가격을 수정하거나 항목을 추가/삭제할 수 있습니다</p>
            <div id="priceEditor"></div>
            <button class="add-row-btn" onclick="addCategory()" style="margin-top:24px;">
                + 새 카테고리 추가
            </button>
            <div style="margin-top:32px;display:flex;gap:12px;justify-content:flex-end;">
                <button class="btn btn-outline" onclick="resetData()">초기화</button>
                <button class="btn btn-primary" id="priceSaveBtn" onclick="saveToGitHub('price')">저장</button>
            </div>
        </div>

        <!-- SERVICES TAB -->
        <div class="tab-panel" id="tab-services">
            <h2 class="panel-title">메뉴 관리</h2>
            <p class="panel-desc">서비스 메뉴의 내용을 수정하거나 추가/삭제할 수 있습니다</p>
            <div id="servicesEditor"></div>
            <button class="add-row-btn" onclick="addService()" style="margin-top:24px;">
                + 새 서비스 추가
            </button>
            <div style="margin-top:32px;display:flex;gap:12px;justify-content:flex-end;">
                <button class="btn btn-outline" onclick="resetData()">초기화</button>
                <button class="btn btn-primary" id="servicesSaveBtn" onclick="saveToGitHub('services')">저장</button>
            </div>
        </div>

        <!-- DESIGNERS TAB -->
        <div class="tab-panel" id="tab-designers">
            <h2 class="panel-title">디자이너 관리</h2>
            <p class="panel-desc">디자이너를 추가하거나 삭제하고, 정보를 수정할 수 있습니다</p>
            <div id="designersEditor"></div>
            <button class="add-row-btn" onclick="addDesigner()" style="margin-top:24px;">
                + 새 디자이너 추가
            </button>
            <div style="margin-top:32px;display:flex;gap:12px;justify-content:flex-end;">
                <button class="btn btn-outline" onclick="resetData()">초기화</button>
                <button class="btn btn-primary" id="designersSaveBtn" onclick="saveToGitHub('designers')">저장</button>
            </div>
        </div>

    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- CONFIRM MODAL -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2 id="modalTitle">확인</h2>
            <p id="modalDesc"></p>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">취소</button>
                <button class="btn btn-danger" id="modalConfirmBtn" onclick="confirmAction()">삭제</button>
            </div>
        </div>
    </div>

    // ==================== LOGIN ====================
    function login() {
        const pw = document.getElementById('loginPassword').value;
        if (pw === DEFAULT_PASSWORD) {
            document.getElementById('loginScreen').classList.add('hidden');
            localStorage.setItem('lb_admin_auth', 'true');
            loadSavedData();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function getGhToken() {
        return getGhTokenStored();
    }

    function logout() {
        localStorage.removeItem('lb_admin_auth');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginPassword').value = '';

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        event.target.classList.add('active');
        document.getElementById('tab-' + tabName).classList.add('active');
    }

    // ==================== RENDER DESIGNERS ====================
    function getPhotoSrc(d) {
        if (photoData[d.photo]) return photoData[d.photo];
        if (d.photoBase64) return d.photoBase64;
        if (d.photo) return '../' + d.photo;
        return '';
    }

    function handlePhotoUpload(index, input) {
        const file = input.files[0];
        if (!file) return;
        const filename = file.name;
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result;
            designersData[index].photo = filename;
            designersData[index].photoBase64 = base64;
            photoData[filename] = base64;
            renderDesigners();
            autoSave();
            showToast('사진이 업로드되었습니다');
        };
        reader.readAsDataURL(file);
    }

    function renderDesigners() {
        const container = document.getElementById('designersEditor');
        container.innerHTML = designersData.map((d, i) => {
            const src = getPhotoSrc(d);
            return `
            <div class="designer-edit-card">
                <button class="btn-icon designer-remove-btn" onclick="removeDesigner(${i})" title="삭제">&times;</button>
                <div class="designer-edit-header">
                    <div class="designer-edit-avatar photo-upload-area" onclick="document.getElementById('photoInput${i}').click()">
                        ${src ? `<img src="${src}" alt="${escHtml(d.name)}">` : '<div class="photo-placeholder">+</div>'}
                        <div class="photo-upload-overlay">${src ? '변경' : '추가'}</div>
                        <input type="file" id="photoInput${i}" accept="image/*" onchange="handlePhotoUpload(${i}, this)">
                    </div>
                    <div class="designer-edit-info">
                        <h3>${escHtml(d.name) || '새 디자이너'}</h3>
                        <p>${escHtml(d.role)}</p>
                        ${d.photo ? `<p style="font-size:11px;color:var(--text-muted);margin-top:4px;">${escHtml(d.photo)}</p>` : ''}
                    </div>
                </div>
                <div class="form-row" style="margin-bottom:16px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">이름</label>
                        <input class="form-input" value="${escHtml(d.name)}"
                            onchange="designersData[${i}].name=this.value;renderDesigners();autoSave()">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">직급 (영문)</label>
                        <input class="form-input" value="${escHtml(d.role)}" placeholder="예: Designer, Senior Designer"
                            onchange="designersData[${i}].role=this.value;renderDesigners();autoSave()">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">전문 분야 (줄바꿈은 Enter)</label>
                    <textarea class="form-textarea" rows="2"
                        onchange="designersData[${i}].spec=this.value;autoSave()">${escHtml(d.spec)}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">인스타그램 핸들</label>
                        <input class="form-input" value="${escHtml(d.instagramHandle)}" placeholder="@username"
                            onchange="designersData[${i}].instagramHandle=this.value;autoSave()">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">인스타그램 URL</label>
                        <input class="form-input" value="${escHtml(d.instagram)}" placeholder="https://www.instagram.com/..."
                            onchange="designersData[${i}].instagram=this.value;autoSave()">
                    </div>

    function addDesigner() {
        designersData.push({
            name: '',
            role: 'Designer',
            spec: '',
            instagram: '',
            instagramHandle: '',
            photo: ''
        });
        renderDesigners();

        showConfirm(`'${designersData[i].name || '새 디자이너'}' 디자이너를 삭제하시겠습니까?`, () => {

    // ==================== SAVE / LOAD ====================
    function autoSave() {
        localStorage.setItem('lb_prices', JSON.stringify(priceData));
        localStorage.setItem('lb_services', JSON.stringify(servicesData));
        localStorage.setItem('lb_designers', JSON.stringify(designersData));
        localStorage.setItem('lb_photos', JSON.stringify(photoData));
        document.getElementById('saveStatus').textContent = '임시 저장됨 — 다운로드하여 적용하세요';
    }

    function loadSavedData() {
        try {
            const p = localStorage.getItem('lb_prices');
            const s = localStorage.getItem('lb_services');
            const d = localStorage.getItem('lb_designers');
            const ph = localStorage.getItem('lb_photos');
            if (p) priceData = JSON.parse(p);
            if (s) servicesData = JSON.parse(s);
            if (d) designersData = JSON.parse(d);
            if (ph) photoData = JSON.parse(ph);
        } catch (e) {}
        renderAll();
    }

    function resetData() {
        showConfirm('모든 변경사항을 초기 상태로 되돌리시겠습니까?', () => {
            localStorage.removeItem('lb_prices');
            localStorage.removeItem('lb_services');
            localStorage.removeItem('lb_designers');
            localStorage.removeItem('lb_photos');
            location.reload();
        });
    }

    function renderAll() {
        renderPrices();
        renderServices();
        renderDesigners();
    }

    // ==================== GENERATE HTML ====================
    function generatePriceHTML() {
        return priceData.map(cat => {
            const rows = cat.items.map(item => `
                <div class="price-row">
                    <span class="price-name">${escHtml(item.name)}</span>
                    <span class="price-dots"></span>
                    <span class="price-value">${escHtml(item.price)}</span>
                </div>`).join('');

            <div class="price-category reveal">
                <h3 class="price-category-title">${escHtml(cat.category)}</h3>${rows}

    function generateServicesHTML() {
        return servicesData.map(svc => {
            const descHtml = escHtml(svc.desc).replace(/\n/g, '<br>');

    function generateDesignersHTML() {

    // ==================== GITHUB API ====================
    async function ghApiGet(path, token) {
        const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/${path}`, {
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) throw new Error(`GitHub API 오류: ${res.status}`);
        return res.json();
    }

    async function ghApiPut(path, token, body) {
        const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || `GitHub API 오류: ${res.status}`);
        }
        return res.json();
    }

    function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }

    function base64ToUtf8(b64) {
        return decodeURIComponent(escape(atob(b64)));
    }

    function dataUrlToRawBase64(dataUrl) {
        return dataUrl.split(',')[1];
    }

    async function saveToGitHub(section) {
        let token = getGhToken();
        if (!token) {
            token = prompt('GitHub 토큰을 입력하세요 (최초 1회만 입력하면 됩니다):');
            if (!token) { showToast('토큰이 필요합니다'); return; }
            setGhTokenStored(token);
        }

        const btnId = section === 'price' ? 'priceSaveBtn' : section === 'services' ? 'servicesSaveBtn' : 'designersSaveBtn';
        const btn = document.getElementById(btnId);
        const origText = btn.textContent;
        btn.textContent = '저장 중...';
        btn.disabled = true;

        try {
            // 1. 현재 index.html 가져오기
            const fileData = await ghApiGet(`contents/index.html?ref=${GH_BRANCH}`, token);
            let html = base64ToUtf8(fileData.content.replace(/\n/g, ''));
            const sha = fileData.sha;

            // 2. 해당 섹션 교체
            if (section === 'price' || section === 'all') {
                html = html.replace(
                    /<!--PRICE_START-->[\s\S]*?<!--PRICE_END-->/,
                    '<!--PRICE_START-->' + generatePriceHTML() + '\n            <!--PRICE_END-->'
                );
            }
            if (section === 'services' || section === 'all') {
                html = html.replace(
                    /<!--SERVICES_START-->[\s\S]*?<!--SERVICES_END-->/,
                    '<!--SERVICES_START-->' + generateServicesHTML() + '\n            <!--SERVICES_END-->'
                );
            }
            if (section === 'designers' || section === 'all') {
                html = html.replace(
                    /<!--DESIGNERS_START-->[\s\S]*?<!--DESIGNERS_END-->/,
                    '<!--DESIGNERS_START-->' + generateDesignersHTML() + '\n            <!--DESIGNERS_END-->'
                );
            }

            // 3. index.html 커밋
            const sectionNames = { price: '가격', services: '메뉴', designers: '디자이너' };
            await ghApiPut('contents/index.html', token, {
                message: `관리자: ${sectionNames[section]} 정보 업데이트`,
                content: utf8ToBase64(html),
                sha: sha,
                branch: GH_BRANCH
            });

            // 4. 디자이너 사진 업로드 (새로 추가된 것만)
            if (section === 'designers') {
                for (const d of designersData) {
                    if (d.photoBase64 && d.photo) {
                        const rawBase64 = dataUrlToRawBase64(d.photoBase64);
                        let fileSha = null;
                        try {
                            const existing = await ghApiGet(`contents/${d.photo}?ref=${GH_BRANCH}`, token);
                            fileSha = existing.sha;
                        } catch (e) { /* 새 파일 */ }

                        const body = {
                            message: `관리자: 디자이너 사진 업로드 (${d.name})`,
                            content: rawBase64,
                            branch: GH_BRANCH
                        };
                        if (fileSha) body.sha = fileSha;
                        await ghApiPut(`contents/${d.photo}`, token, body);
                        delete d.photoBase64;
                    }
                }
            }

            autoSave();
            showToast('저장 완료! 잠시 후 사이트에 반영됩니다');
        } catch (err) {
            showToast('저장 실패: ' + err.message);
        } finally {
            btn.textContent = origText;
            btn.disabled = false;
        }
    }

    // ==================== UTILS ====================
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    let pendingAction = null;
    function showConfirm(msg, action) {
        document.getElementById('modalDesc').textContent = msg;
        document.getElementById('confirmModal').classList.add('show');
        pendingAction = action;
    }

    function confirmAction() {
        if (pendingAction) pendingAction();
        closeModal();
    }

    function closeModal() {
        document.getElementById('confirmModal').classList.remove('show');
        pendingAction = null;
    }

    // ==================== INIT ====================
    loadSavedData();
    </script>
